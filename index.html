<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Запись 💅</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(180deg, #fff, #ffeaf3);
  color: #222;
}

.header {
  padding: 30px 20px 10px;
  font-size: 28px;
  font-weight: 700;
  color: #ff6fa5;
}

.sub {
  padding: 0 20px;
  color: #888;
  font-size: 14px;
}

.container {
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 15px;
  box-shadow: 0 10px 25px rgba(255,120,170,0.2);
}

.label {
  font-size: 14px;
  color: #888;
  margin-bottom: 8px;
}

/* услуги */
.service {
  padding: 12px;
  border-radius: 12px;
  background: #fff0f6;
  margin-bottom: 8px;
  cursor: pointer;
}

.service.active {
  background: #ff74aa;
  color: white;
}

/* время */
.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.time {
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  background: #f8f8f8;
  cursor: pointer;
}

.time.active {
  background: #ff74aa;
  color: white;
}

/* кнопка */
button {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #ff9acb, #ff4d94);
  color: white;
  font-size: 16px;
  font-weight: 600;
  box-shadow: 0 8px 20px rgba(255,120,170,0.4);
}
</style>
</head>

<body>

<div class="header">Запись 💅</div>
<div class="sub">Мастер Кристина</div>

<div class="container">

  <div class="card">
    <div class="label">Услуга</div>

    <div class="service" onclick="selectService(this)">Маникюр — 1200</div>
    <div class="service" onclick="selectService(this)">Маникюр + покрытие — 1800</div>
    <div class="service" onclick="selectService(this)">Наращивание — 2500</div>
    <div class="service" onclick="selectService(this)">Снятие — 400</div>
  </div>

  <div class="card">
    <div class="label">Дата</div>
    <input type="date" id="date" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd;">
  </div>

  <div class="card">
    <div class="label">Время</div>
    <div class="time-grid">
      <div class="time" onclick="selectTime(this)">10:00</div>
      <div class="time" onclick="selectTime(this)">12:00</div>
      <div class="time" onclick="selectTime(this)">14:00</div>
      <div class="time" onclick="selectTime(this)">16:00</div>
      <div class="time" onclick="selectTime(this)">18:00</div>
    </div>
  </div>

  <button onclick="send()">Записаться 💗</button>

</div>
<script>
Telegram.WebApp.expand();
Telegram.WebApp.ready();

let selectedService = null;
let selectedTime = null;

function selectService(el){
  document.querySelectorAll('.service').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  selectedService = el.innerText;
}

function selectTime(el){
  document.querySelectorAll('.time').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedTime = el.innerText;
}

function send(){

  const date = document.getElementById("date").value;

  if(!selectedService || !selectedTime || !date){
    Telegram.WebApp.showAlert("Выберите услугу, дату и время 💗");
    return;
  }

  const data = {
    service: selectedService,
    date: date,
    time: selectedTime
  };

  console.log("📤 ОТПРАВКА:", data);

  Telegram.WebApp.sendData(JSON.stringify(data));

  Telegram.WebApp.showAlert(`💖 Запись создана!
📅 ${date}
⏰ ${selectedTime}
💅 ${selectedService}`);

  setTimeout(() => {
    Telegram.WebApp.close();
  }, 800);
}

</script>



</body>
</html>
