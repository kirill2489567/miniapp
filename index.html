<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Маникюр</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #222;
}

.header {
  padding: 25px 20px 10px;
  font-size: 26px;
  font-weight: 700;
}

.sub {
  padding: 0 20px;
  color: #888;
  font-size: 14px;
}

.container {
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.label {
  font-size: 14px;
  color: #888;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #eee;
  font-size: 16px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #f8cdda, #f4a7b9);
  color: white;
  font-size: 16px;
  font-weight: 600;
  margin-top: 10px;
  box-shadow: 0 8px 20px rgba(244,167,185,0.4);
}

button:active {
  transform: scale(0.98);
}

.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.time {
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  background: #f8f8f8;
  cursor: pointer;
}

.time.active {
  background: #f4a7b9;
  color: white;
}

</style>
</head>

<body>

<div class="header">Запись 💅</div>
<div class="sub">Выберите удобное время</div>

<div class="container">

  <div class="card">
    <div class="label">Дата</div>
    <input type="date" id="date">
  </div>

  <div class="card">
    <div class="label">Время</div>
    <div class="time-grid">
      <div class="time" onclick="selectTime(this)">10:00</div>
      <div class="time" onclick="selectTime(this)">12:00</div>
      <div class="time" onclick="selectTime(this)">14:00</div>
      <div class="time" onclick="selectTime(this)">16:00</div>
      <div class="time" onclick="selectTime(this)">18:00</div>
    </div>
  </div>

  <button onclick="sendBooking()">Записаться</button>

</div>

<script>

let selectedTime = "";

function selectTime(el){
  document.querySelectorAll('.time').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedTime = el.innerText;
}

function sendBooking(){
  const date = document.getElementById("date").value;

  if(!date || !selectedTime){
    alert("Выберите дату и время");
    return;
  }

  const data = {
    date: date,
    time: selectedTime
  };

  Telegram.WebApp.sendData(JSON.stringify(data));
  Telegram.WebApp.close();
}

Telegram.WebApp.ready();

</script>

</body>
</html>
