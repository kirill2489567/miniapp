<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запись на маникюр</title>

<style>
  body {
    margin: 0;
    background: #ffeef6;
    font-family: "Inter", sans-serif;
    color: #333;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px;
    text-align: center;
    font-size: 1.7em;
    font-weight: 600;
    background: linear-gradient(135deg, #ff9acb, #ff74aa);
    color: white;
    border-bottom-left-radius: 25px;
    border-bottom-right-radius: 25px;
    box-shadow: 0 5px 10px rgba(255, 120, 170, 0.3);
  }

  .container {
    width: 90%;
    max-width: 420px;
    margin-top: 25px;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(255, 120, 170, 0.2);
    animation: fadeIn 0.6s ease;
  }

  h2 {
    color: #ff74aa;
    margin-bottom: 10px;
    text-align: center;
  }

  label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
  }

  input, select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 2px solid #ffc7df;
    background: #fff8fc;
    margin-top: 5px;
    font-size: 1em;
    outline: none;
    transition: 0.3s;
  }

  input:focus, select:focus {
    border-color: #ff74aa;
  }

  .btn {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    font-size: 1.2em;
    background: linear-gradient(135deg, #ff74aa, #ff4990);
    border: none;
    color: white;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(255, 80, 150, 0.3);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(255, 80, 150, 0.4);
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(15px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>
</head>

<body>

<header>Запись на маникюр 💅</header>

<div class="container">
  <h2>Выберите дату и время</h2>

  <label>Дата:</label>
  <input type="date" id="dateInput">

  <label>Время:</label>
  <select id="timeInput">
    <option value="">Выберите время</option>
    <option>10:00</option>
    <option>12:00</option>
    <option>14:00</option>
    <option>16:00</option>
    <option>18:00</option>
  </select>

  <button class="btn" onclick="sendBooking()">Записаться 💗</button>
</div>

<script>
  function sendBooking() {
    const date = document.getElementById("dateInput").value;
    const time = document.getElementById("timeInput").value;

    if (!date || !time) {
      alert("Пожалуйста, выберите дату и время 🌸");
      return;
    }

    const data = {
      date: date,
      time: time
    };

    // Это отправится боту — подключим позже
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.sendData(JSON.stringify(data));
    }

    alert("Вы записаны! 💖\n" + date + " в " + time);
  }
</script>

</body>
</html>
