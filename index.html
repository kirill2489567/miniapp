<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Запись на маникюр</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #222;
}

/* Заголовок */
.header {
  padding: 25px 20px 5px;
  font-size: 28px;
  font-weight: 700;
}

.sub {
  padding: 0 20px;
  color: #888;
  font-size: 14px;
}

/* Контейнер */
.container {
  padding: 20px;
}

/* Карточки */
.card {
  background: #fff;
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.label {
  font-size: 14px;
  color: #888;
  margin-bottom: 8px;
}

/* Пикеры */
.picker-row {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.picker {
  width: 48%;
  height: 140px;
  overflow-y: scroll;
  scrollbar-width: none;
  -ms-overflow-style: none;

  text-align: center;
  padding-top: 40px;
  padding-bottom: 40px;

  border-radius: 16px;
  background: #fdf2f7;
  box-shadow: inset 0 0 14px rgba(244,167,185,0.35);
}

.picker::-webkit-scrollbar {
  display: none;
}

.picker div {
  padding: 10px 0;
  font-size: 18px;
  color: #444;
  transition: 0.2s;
}

.picker div.active {
  font-size: 22px;
  font-weight: 600;
  color: #f4a7b9;
}

/* Время */
.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.time {
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  background: #f8f8f8;
  cursor: pointer;
  transition: 0.2s;
  font-weight: 500;
}

.time.active {
  background: #f4a7b9;
  color: white;
  box-shadow: 0 4px 10px rgba(244,167,185,0.4);
}

/* Кнопка */
button {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #f8cdda, #f4a7b9);
  color: white;
  font-size: 16px;
  font-weight: 600;
  margin-top: 10px;
  box-shadow: 0 8px 20px rgba(244,167,185,0.4);
}

button:active {
  transform: scale(0.98);
}

</style>
</head>

<body>

<div class="header">Запись 💅</div>
<div class="sub">Выберите дату и время</div>

<div class="container">

  <div class="card">
    <div class="label">Дата</div>

    <div class="picker-row">
      <div class="picker" id="dayPicker"></div>
      <div class="picker" id="monthPicker"></div>
    </div>
  </div>

  <div class="card">
    <div class="label">Время</div>
    <div class="time-grid">
      <div class="time" onclick="selectTime(this)">10:00</div>
      <div class="time" onclick="selectTime(this)">12:00</div>
      <div class="time" onclick="selectTime(this)">14:00</div>
      <div class="time" onclick="selectTime(this)">16:00</div>
      <div class="time" onclick="selectTime(this)">18:00</div>
    </div>
  </div>

  <button onclick="sendBooking()">Записаться</button>

</div>

<script>

// ==== ПИКЕРЫ ====

const days = Array.from({length: 31}, (_, i) => i + 1);
const months = [
  "Январь","Февраль","Март","Апрель","Май","Июнь",
  "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"
];

let selectedDay = null;
let selectedMonth = null;
let selectedTime = null;

function buildPicker(list, pickerId, onSelect) {
  const picker = document.getElementById(pickerId);

  list.forEach((item) => {
    const div = document.createElement("div");
    div.innerText = item;

    div.onclick = () => {
      [...picker.children].forEach(d => d.classList.remove("active"));
      div.classList.add("active");
      onSelect(item);
    };

    picker.appendChild(div);
  });
}

buildPicker(days, "dayPicker", (d) => selectedDay = d);
buildPicker(months, "monthPicker", (m) => selectedMonth = m);

// ==== ВРЕМЯ ====

function selectTime(el){
  document.querySelectorAll('.time').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedTime = el.innerText;
}

// ==== ОТПРАВКА ====

function sendBooking(){

  if(!selectedDay || !selectedMonth || !selectedTime){
    alert("Выберите день, месяц и время");
    return;
  }

  const data = {
    day: selectedDay,
    month: selectedMonth,
    time: selectedTime
  };

  Telegram.WebApp.sendData(JSON.stringify(data));
  Telegram.WebApp.close();
}

Telegram.WebApp.ready();

</script>

</body>
</html>
